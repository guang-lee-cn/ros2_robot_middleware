name: Test

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-24.04
    container: osrf/ros:jazzy-ros-base
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update -qq
          apt-get install -y -qq python3-colcon-common-extensions python3-rosdep ros-jazzy-rclcpp-action ros-jazzy-action-msgs
        shell: bash

      - name: Build and test
        run: ./test/test.sh
        shell: bash
